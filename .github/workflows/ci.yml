name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install ruff
      run: pip install 'ruff>=0.4'

    - name: Ruff check
      run: ruff check __init__.py tests/

    - name: Ruff format check
      run: ruff format --check __init__.py tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install mypy
      run: pip install 'mypy>=1.10'

    - name: Run mypy
      # mypy can't infer package from __init__.py when the dir has a hyphen.
      # Copy to a temp dir with a valid name and check there.
      # Currently non-blocking (|| true) — 11 pre-existing type annotation
      # mismatches to fix incrementally. Remove `|| true` once all are resolved.
      run: |
        mkdir -p /tmp/mypy-check/model_sherpa
        cp __init__.py /tmp/mypy-check/model_sherpa/
        mypy --ignore-missing-imports /tmp/mypy-check/model_sherpa/__init__.py || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: pip install pytest pytest-asyncio

    - name: Run tests
      run: make test
